name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - prod

concurrency: # only run one infra apply or destroy at a time for the same environment
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  generate_waves:
    name: Waves
    uses: ./.github/workflows/shared_get_modules.yml
    with:
      environment: ${{ inputs.environment }}
      infra_version: ${{ github.sha }}
      ignore_shared_artifact_modules: true
      ignore_oidc_module: true
      wave_summary_title: Destroy Wave Summary
      wave_summary_note: Destroy runs dependency waves in reverse order. OIDC and shared artifact modules are excluded.
      wave_summary_order: reverse

  wave_0:
    name: 0 / ${{ matrix.module }}
    needs: generate_waves
    if: ${{ needs.generate_waves.outputs.wave_0_modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.generate_waves.outputs.wave_0_modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy ${{ matrix.module }} infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: destroy
