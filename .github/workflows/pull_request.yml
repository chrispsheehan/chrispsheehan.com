name: Pull Request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        uses: ./.github/actions/just
        with:
          just_action: --list

      - name: Check agent wrappers match
        shell: bash
        run: |
          cmp AGENTS.md CLAUDE.md

      - name: Build frontend
        uses: ./.github/actions/just
        with:
          justfile_path: scripts/deploy/justfile
          just_action: frontend-build

      - name: Test get-changes action
        shell: bash
        working-directory: .github/actions/get-changes
        run: |
          python -m unittest test_get_changes.py

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.13.3
          terraform_wrapper: false

      - name: Install Terragrunt
        uses: jdx/mise-action@v4
        with:
          tool_versions: |
            terragrunt 0.72.6
          github_token: ${{ github.token }}

      - name: Check Terraform formatting
        shell: bash
        run: |
          terraform fmt -check -recursive

      - name: Check Terragrunt formatting
        shell: bash
        run: |
          terragrunt hclfmt --check
