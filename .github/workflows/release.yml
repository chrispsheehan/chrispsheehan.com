name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
  issues: write

jobs:
  get-current-tag:
    name: Current Tag
    runs-on: ubuntu-latest
    outputs:
      current_tag: ${{ steps.get_tag.outputs.CURRENT_TAG }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current tag
        id: get_tag
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "CURRENT_TAG=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"

  get-next-tag:
    name: Next Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_next_version.outputs.version }}
      create-new-tag: ${{ steps.get_next_version.outputs.createNewTag }}
      create-new-release: ${{ steps.get_next_version.outputs.createNewRelease }}
      bump: ${{ steps.get_next_version.outputs.bump }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: chrispsheehan/get-release-version@v1

      - name: Show the next version
        run: |
          echo "${{ steps.get_next_version.outputs.version }}"
          echo "${{ steps.get_next_version.outputs.createNewTag }}"
          echo "${{ steps.get_next_version.outputs.createNewRelease }}"
          echo "${{ steps.get_next_version.outputs.bump }}"

  create-tag:
    name: Tag
    needs: get-next-tag
    if: ${{ needs.get-next-tag.outputs.create-new-tag == 'true' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.get-next-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Create new tag
        run: |
          echo "Tagging $TAG"
          git tag "$TAG"
          git push origin --tag "$TAG"

  get-commits:
    name: Commits
    needs:
      - get-next-tag
      - create-tag
      - get-current-tag
    if: ${{ needs.get-next-tag.outputs.create-new-release == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.commits.outputs.COMMITS }}
    env:
      TAG: ${{ needs.get-next-tag.outputs.tag }}
      CURRENT_TAG: ${{ needs.get-current-tag.outputs.current_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit messages
        id: commits
        run: |
          if [[ -n "$CURRENT_TAG" ]]; then
            COMMITS=$(git log "${CURRENT_TAG}..${TAG}" --pretty=format:"* %s")
          else
            COMMITS=$(git log "$TAG" --pretty=format:"* %s")
          fi
          echo "COMMITS<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs:
      - create-tag
      - get-next-tag
    if: ${{ needs.get-next-tag.outputs.create-new-release == 'true' }}
    uses: ./.github/workflows/shared_build.yml
    permissions:
      id-token: write
      contents: write
    with:
      environment: ci
      frontend_version: ${{ needs.get-next-tag.outputs.tag }}
      lambda_version: ${{ needs.get-next-tag.outputs.tag }}

  release:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - get-next-tag
      - create-tag
      - get-commits
      - build
    if: ${{ needs.get-next-tag.outputs.create-new-release == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-next-tag.outputs.tag }}
          body: |
            Release Notes:
            ${{ needs.get-commits.outputs.commits }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
