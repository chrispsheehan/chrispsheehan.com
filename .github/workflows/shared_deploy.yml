name: Shared Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      frontend_version:
        description: "Frontend artifact version"
        required: true
        type: string
      lambda_version:
        description: "Lambda artifact version"
        required: true
        type: string
      lambda_keep:
        description: "Number of Lambda versions to keep during pruning"
        required: false
        default: 5
        type: number
      code_bucket:
        description: "Bucket containing frontend artifacts"
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  summary:
    name: Summary
    runs-on: ubuntu-latest
    steps:
      - name: Write deploy summary
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          FRONTEND_VERSION: ${{ inputs.frontend_version }}
          LAMBDA_VERSION: ${{ inputs.lambda_version }}
          CODE_BUCKET: ${{ inputs.code_bucket }}
        run: |
          set -euo pipefail

          {
            echo "## Code Deploy Summary"
            echo
            echo "- \`environment\`: \`$ENVIRONMENT\`"
            echo "- \`frontend_version\`: \`$FRONTEND_VERSION\`"
            echo "- \`lambda_version\`: \`$LAMBDA_VERSION\`"
            echo "- \`code_bucket\`: \`$CODE_BUCKET\`"
            echo "- \`frontend\`: \`frontend.zip -> infra/live/$ENVIRONMENT/aws/frontend\`"
            echo "- \`log_processor\`: \`log_processor.zip -> infra/live/$ENVIRONMENT/aws/log_processor\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs:
      - summary
    outputs:
      cloudfront_distribution_id: ${{ steps.get_frontend_outputs.outputs.cloudfront_distribution_id }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get frontend infra
        uses: ./.github/actions/terragrunt
        id: get-infra
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/frontend
          tg_action: init

      - name: Get frontend outputs
        id: get_frontend_outputs
        env:
          TG_OUTPUTS: ${{ steps.get-infra.outputs.tg_outputs }}
        run: |
          echo "website_bucket=$(echo "$TG_OUTPUTS" | jq -r '.bucket_name.value')" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(echo "$TG_OUTPUTS" | jq -r '.cloudfront_distribution_id.value')" >> "$GITHUB_OUTPUT"
          echo "website_url=$(echo "$TG_OUTPUTS" | jq -r '.website_url.value')" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ inputs.code_bucket }}
          VERSION: ${{ inputs.frontend_version }}
          WEBSITE_BUCKET: ${{ steps.get_frontend_outputs.outputs.website_bucket }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: frontend-deploy

      - name: Write URL summary
        shell: bash
        env:
          WEBSITE_URL: ${{ steps.get_frontend_outputs.outputs.website_url }}
        run: |
          echo "- \`url\`: \`$WEBSITE_URL\`" >> "$GITHUB_STEP_SUMMARY"

  lambda-log-processor:
    name: Log Processor Lambda
    needs: summary
    runs-on: ubuntu-latest
    outputs:
      lambda_function_name: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Lambda deploy paths
        id: lambda_paths
        shell: bash
        run: |
          stack_name="log_processor"
          lambda_zip_key="lambdas/${{ inputs.lambda_version }}/log_processor.zip"
          lambda_appspec_key="lambdas/${{ inputs.lambda_version }}/$stack_name-appspec.zip"
          echo "lambda_zip_key=$lambda_zip_key" >> $GITHUB_OUTPUT
          echo "lambda_appspec_key=$lambda_appspec_key" >> $GITHUB_OUTPUT

      - name: Get log processor infra
        uses: ./.github/actions/terragrunt
        id: get-infra
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/log_processor
          tg_action: init

      - name: Get infra detail
        id: get_infra_detail
        env:
          TG_OUTPUTS: ${{ steps.get-infra.outputs.tg_outputs  }}
        run: |
          echo "lambda_function_name=$(echo $TG_OUTPUTS | jq -r '.lambda_function_name.value')" >> $GITHUB_OUTPUT
          echo "lambda_alias_name=$(echo $TG_OUTPUTS | jq -r '.lambda_alias_name.value')" >> $GITHUB_OUTPUT

      - name: Publish new lambda version
        id: publish
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ inputs.code_bucket }}
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          LAMBDA_ZIP_KEY: ${{ steps.lambda_paths.outputs.lambda_zip_key }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-create-version

      - name: Get current lambda version
        id: get-version
        uses: ./.github/actions/just
        env:
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          ALIAS_NAME: ${{ steps.get_infra_detail.outputs.lambda_alias_name }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-get-version

      - name: Run CodeDeploy
        uses: ./.github/actions/just
        env:
          KEEP: ${{ inputs.lambda_keep }}
          BUCKET_NAME: ${{ inputs.code_bucket }}
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          ALIAS_NAME: ${{ steps.get_infra_detail.outputs.lambda_alias_name }}
          CURRENT_VERSION: ${{ steps.get-version.outputs.just_outputs }}
          NEW_VERSION: ${{ steps.publish.outputs.just_outputs }}
          APP_SPEC_FILE: ${{ github.workspace }}/lambdas/appspec-lambda.rendered.yml
          APP_SPEC_KEY: ${{ steps.lambda_paths.outputs.lambda_appspec_key }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-upload-bundle lambda-deploy lambda-prune

  refresh-frontend:
    name: Refresh Frontend
    runs-on: ubuntu-latest
    needs:
      - frontend
      - summary
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Refresh Frontend Cache
        uses: ./.github/actions/just
        env:
          DISTRIBUTION_ID: ${{ needs.frontend.outputs.cloudfront_distribution_id }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: frontend-refresh

  invoke-log-processor:
    name: Invoke Log Processor
    runs-on: ubuntu-latest
    needs:
      - refresh-frontend
      - lambda-log-processor
      - summary
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Lambda
        uses: ./.github/actions/just
        env:
          LAMBDA_NAME: ${{ needs.lambda-log-processor.outputs.lambda_function_name }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-invoke
