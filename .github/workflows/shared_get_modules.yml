name: Shared Get Modules

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to inspect"
        required: true
        type: string
      ignore_shared_artifact_modules:
        description: "Whether to exclude shared artifact modules such as code_bucket from emitted waves"
        required: false
        type: boolean
        default: false
      ignore_oidc_module:
        description: "Whether to exclude the oidc module from emitted waves"
        required: false
        type: boolean
        default: false
      show_wave_summary:
        description: "Whether to write a Terragrunt wave overview to the GitHub step summary"
        required: false
        type: boolean
        default: true
      wave_summary_title:
        description: "Title for the Terragrunt wave step summary"
        required: false
        type: string
        default: "Terragrunt Wave Summary"
      wave_summary_note:
        description: "Optional note to include below the Terragrunt wave step summary heading"
        required: false
        type: string
        default: ""
      wave_summary_order:
        description: "Display order for wave summary rows: forward or reverse"
        required: false
        type: string
        default: "forward"
      show_wave_json:
        description: "Whether to include the raw wave JSON in the GitHub step summary"
        required: false
        type: boolean
        default: false
    outputs:
      waves_json:
        description: "Dependency-safe Terragrunt wave matrix JSON"
        value: ${{ jobs.generate_waves.outputs.waves_json }}
      wave_0_modules:
        description: "Wave 0 module array"
        value: ${{ jobs.generate_waves.outputs.wave_0_modules }}
      wave_1_modules:
        description: "Wave 1 module array"
        value: ${{ jobs.generate_waves.outputs.wave_1_modules }}
      wave_2_modules:
        description: "Wave 2 module array"
        value: ${{ jobs.generate_waves.outputs.wave_2_modules }}
      wave_3_modules:
        description: "Wave 3 module array"
        value: ${{ jobs.generate_waves.outputs.wave_3_modules }}

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  generate_waves:
    name: Summary
    runs-on: ubuntu-latest
    outputs:
      waves_json: ${{ steps.filtered_waves.outputs.waves_json }}
      wave_0_modules: ${{ steps.wave_outputs.outputs.wave_0_modules }}
      wave_1_modules: ${{ steps.wave_outputs.outputs.wave_1_modules }}
      wave_2_modules: ${{ steps.wave_outputs.outputs.wave_2_modules }}
      wave_3_modules: ${{ steps.wave_outputs.outputs.wave_3_modules }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render Terragrunt graph
        id: tg_graph
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws
          tg_action: graph

      - name: Convert graph output to compact JSON
        id: tg_graph_json
        uses: ./.github/actions/just
        env:
          TG_GRAPH_OUTPUT: ${{ steps.tg_graph.outputs.tg_graph_output }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: tg-graph-output-to-json ${{ inputs.environment }}

      - name: Build wave matrix JSON
        id: waves_json
        uses: ./.github/actions/just
        env:
          TG_GRAPH_JSON: ${{ steps.tg_graph_json.outputs.just_outputs }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: tg-graph-json-to-waves

      - name: Optionally exclude modules from wave matrix
        id: filtered_waves
        shell: bash
        env:
          RAW_WAVES_JSON: ${{ steps.waves_json.outputs.just_outputs }}
          IGNORE_SHARED_ARTIFACT_MODULES: ${{ inputs.ignore_shared_artifact_modules }}
          IGNORE_OIDC_MODULE: ${{ inputs.ignore_oidc_module }}
        run: |
          echo "waves_json=$(jq -c '
            if $ignore_shared_artifact_modules then
                map(.modules |= map(select(. != "code_bucket")))
              else
                .
              end
            | if $ignore_oidc_module then
                map(.modules |= map(select(. != "oidc")))
              else
                .
              end
            | map(select(.modules | length > 0))
            | to_entries
            | map({wave: .key, modules: .value.modules})
          ' --argjson ignore_shared_artifact_modules "$IGNORE_SHARED_ARTIFACT_MODULES" --argjson ignore_oidc_module "$IGNORE_OIDC_MODULE" <<<"$RAW_WAVES_JSON")" >> "$GITHUB_OUTPUT"

      - name: Expose wave module arrays
        id: wave_outputs
        shell: bash
        env:
          WAVES_JSON: ${{ steps.filtered_waves.outputs.waves_json }}
        run: |
          echo "wave_0_modules=$(jq -c '.[0].modules // []' <<<"$WAVES_JSON")" >> "$GITHUB_OUTPUT"
          echo "wave_1_modules=$(jq -c '.[1].modules // []' <<<"$WAVES_JSON")" >> "$GITHUB_OUTPUT"
          echo "wave_2_modules=$(jq -c '.[2].modules // []' <<<"$WAVES_JSON")" >> "$GITHUB_OUTPUT"
          echo "wave_3_modules=$(jq -c '.[3].modules // []' <<<"$WAVES_JSON")" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: ${{ inputs.show_wave_summary }}
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          INFRA_VERSION: ${{ inputs.infra_version }}
          SUMMARY_TITLE: ${{ inputs.wave_summary_title }}
          SUMMARY_NOTE: ${{ inputs.wave_summary_note }}
          SUMMARY_ORDER: ${{ inputs.wave_summary_order }}
          SHOW_WAVE_JSON: ${{ inputs.show_wave_json }}
          WAVES_JSON: ${{ steps.filtered_waves.outputs.waves_json }}
        run: |
          set -euo pipefail

          waves_json="${WAVES_JSON:-[]}"
          if [[ "$SUMMARY_ORDER" == "reverse" ]]; then
            summary_waves_json="$(jq -c 'reverse' <<<"$waves_json")"
          else
            summary_waves_json="$waves_json"
          fi

          {
            echo "## $SUMMARY_TITLE"
            echo
            echo "- \`environment\`: \`$ENVIRONMENT\`"
            echo "- \`infra_version\`: \`$INFRA_VERSION\`"
            echo "- \`waves\`: \`$(jq -r 'length' <<<"$waves_json")\`"
            echo "- \`modules\`: \`$(jq -r 'map(.modules | length) | add // 0' <<<"$waves_json")\`"
            echo
            if [[ -n "$SUMMARY_NOTE" ]]; then
              echo "$SUMMARY_NOTE"
              echo
            fi
            echo "| Wave | Modules |"
            echo "| --- | --- |"
            jq -r '
              if length == 0 then
                ["| none | No modules selected |"]
              else
                map(
                  .wave as $wave
                  | (.modules | map("`" + . + "`") | join(", ")) as $modules
                  | "| \($wave) | \($modules) |"
                )
              end
              | .[]
            ' <<<"$summary_waves_json"

            if [[ "$SHOW_WAVE_JSON" == "true" ]]; then
              echo
              echo "<details>"
              echo "<summary>Wave JSON</summary>"
              echo
              echo '```json'
              jq . <<<"$waves_json"
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
