name: Shared Infra Apply From Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      plan_artifact_run_id:
        description: "Workflow run ID used to recover metadata and plan artifacts"
        required: true
        type: string

concurrency:
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  metadata:
    name: Saved Plan
    runs-on: ubuntu-latest
    outputs:
      infra_version: ${{ steps.read_metadata.outputs.infra_version }}
      waves_json: ${{ steps.read_metadata.outputs.waves_json }}
      wave_0_modules: ${{ steps.read_metadata.outputs.wave_0_modules }}
      wave_1_modules: ${{ steps.read_metadata.outputs.wave_1_modules }}
      wave_2_modules: ${{ steps.read_metadata.outputs.wave_2_modules }}
    steps:
      - uses: actions/checkout@v6

      - name: Download plan metadata artifact
        uses: actions/download-artifact@v7
        with:
          name: infra-plan-metadata
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: .

      - name: Download saved plan metadata artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: terragrunt-plan-${{ inputs.environment }}-*
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: plan-artifacts

      - name: Check plan metadata artifact
        shell: bash
        run: |
          if [ ! -f plan-metadata.json ]; then
            echo "::error title=Missing plan metadata artifact::Expected artifact 'infra-plan-metadata' containing 'plan-metadata.json' from workflow run '${{ inputs.plan_artifact_run_id }}', but it was not downloaded."
            exit 1
          fi

      - name: Print recovered plan metadata JSON
        shell: bash
        run: |
          echo "=== plan-metadata.json ==="
          cat plan-metadata.json
          echo "=== downloaded plan metadata files ==="
          find plan-artifacts -name terragrunt.plan.meta.json -print | sort

      - name: Filter saved plan waves to changed modules
        id: filter_waves
        uses: ./.github/actions/just
        env:
          PLAN_METADATA_FILE: plan-metadata.json
          PLAN_ARTIFACTS_DIR: plan-artifacts
        with:
          justfile_path: scripts/ci/justfile
          just_action: infra-plan-filter-waves-by-changes

      - name: Read plan metadata
        id: read_metadata
        shell: bash
        env:
          FILTERED_WAVES_JSON: ${{ steps.filter_waves.outputs.just_outputs }}
        run: |
          set -euo pipefail

          echo "infra_version=$(jq -r '.infra_version' plan-metadata.json)" >> "$GITHUB_OUTPUT"
          filtered_waves_json="$(printf '%s\n' "$FILTERED_WAVES_JSON" | jq -c .)"

          echo "waves_json=$filtered_waves_json" >> "$GITHUB_OUTPUT"
          echo "wave_0_modules=$(jq -c '.[0].modules // []' <<<"$filtered_waves_json")" >> "$GITHUB_OUTPUT"
          echo "wave_1_modules=$(jq -c '.[1].modules // []' <<<"$filtered_waves_json")" >> "$GITHUB_OUTPUT"
          echo "wave_2_modules=$(jq -c '.[2].modules // []' <<<"$filtered_waves_json")" >> "$GITHUB_OUTPUT"

      - name: Print filtered apply waves and write summary
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PLAN_ARTIFACT_RUN_ID: ${{ inputs.plan_artifact_run_id }}
          INFRA_VERSION: ${{ steps.read_metadata.outputs.infra_version }}
          WAVES_JSON: ${{ steps.read_metadata.outputs.waves_json }}
          WAVE_0_MODULES: ${{ steps.read_metadata.outputs.wave_0_modules }}
          WAVE_1_MODULES: ${{ steps.read_metadata.outputs.wave_1_modules }}
          WAVE_2_MODULES: ${{ steps.read_metadata.outputs.wave_2_modules }}
        run: |
          set -euo pipefail

          echo "=== filtered apply waves ==="
          printf '%s\n' "$WAVES_JSON" | jq .
          echo "wave_0_modules=$WAVE_0_MODULES"
          echo "wave_1_modules=$WAVE_1_MODULES"
          echo "wave_2_modules=$WAVE_2_MODULES"

          {
            echo "## Apply From Plan Summary"
            echo
            echo "- \`environment\`: \`$ENVIRONMENT\`"
            echo "- \`infra_version\`: \`$INFRA_VERSION\`"
            echo "- \`plan_artifact_run_id\`: \`$PLAN_ARTIFACT_RUN_ID\`"
            echo "- \`waves\`: \`$(jq -r 'length' <<<"$WAVES_JSON")\`"
            echo "- \`modules_to_apply\`: \`$(jq -r 'map(.modules | length) | add // 0' <<<"$WAVES_JSON")\`"
            echo
            echo "Filtered to modules whose saved plan metadata reported changes."
            echo
            echo "| Wave | Modules To Apply |"
            echo "| --- | --- |"
            jq -r '
              if length == 0 then
                ["| none | No modules selected |"]
              else
                map(
                  .wave as $wave
                  | (.modules | map("`" + . + "`") | join(", ")) as $modules
                  | "| \($wave) | \($modules) |"
                )
              end
              | .[]
            ' <<<"$WAVES_JSON"
          } >> "$GITHUB_STEP_SUMMARY"

  wave_0:
    needs: metadata
    name: 0 / ${{ matrix.module }}
    if: ${{ needs.metadata.outputs.wave_0_modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.metadata.outputs.wave_0_modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download saved plan artifact
        uses: actions/download-artifact@v7
        with:
          name: terragrunt-plan-${{ inputs.environment }}-${{ matrix.module }}
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}

      - name: Print saved plan files
        shell: bash
        run: |
          module_dir="infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}"
          echo "=== downloaded saved plan files ==="
          ls -la "$module_dir"
          echo "=== saved plan metadata ==="
          cat "$module_dir/terragrunt.plan.meta.json"

      - name: Apply ${{ matrix.module }} infra from saved plan
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: apply_plan

  wave_1:
    needs:
      - metadata
      - wave_0
    name: 1 / ${{ matrix.module }}
    if: ${{ always() && needs.metadata.outputs.wave_1_modules != '[]' && (needs.wave_0.result == 'success' || needs.wave_0.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.metadata.outputs.wave_1_modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download saved plan artifact
        uses: actions/download-artifact@v7
        with:
          name: terragrunt-plan-${{ inputs.environment }}-${{ matrix.module }}
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}

      - name: Print saved plan files
        shell: bash
        run: |
          module_dir="infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}"
          echo "=== downloaded saved plan files ==="
          ls -la "$module_dir"
          echo "=== saved plan metadata ==="
          cat "$module_dir/terragrunt.plan.meta.json"

      - name: Apply ${{ matrix.module }} infra from saved plan
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: apply_plan

  wave_2:
    needs:
      - metadata
      - wave_1
    name: 2 / ${{ matrix.module }}
    if: ${{ always() && needs.metadata.outputs.wave_2_modules != '[]' && (needs.wave_1.result == 'success' || needs.wave_1.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.metadata.outputs.wave_2_modules) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download saved plan artifact
        uses: actions/download-artifact@v7
        with:
          name: terragrunt-plan-${{ inputs.environment }}-${{ matrix.module }}
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}

      - name: Print saved plan files
        shell: bash
        run: |
          module_dir="infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}"
          echo "=== downloaded saved plan files ==="
          ls -la "$module_dir"
          echo "=== saved plan metadata ==="
          cat "$module_dir/terragrunt.plan.meta.json"

      - name: Apply ${{ matrix.module }} infra from saved plan
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: apply_plan
