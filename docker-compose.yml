services:
  log-processor:
    image: python:3.12-slim
    env_file:
      - .env
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-default}
    volumes:
      - ".:/workspace"
      - "${HOME}/.aws:/root/.aws:ro"
    working_dir: /workspace
    entrypoint:
      - /bin/sh
      - -c
      - >
        set -e;
        python -m pip install --quiet --no-cache-dir -r lambdas/log_processor/requirements.txt;
        python -m lambdas.log_processor.logs_processor local-log-processor
        --local-s3-output-dir docker/log-processor-s3-database
        --summary-output frontend/public/data/log-processor/data.json
