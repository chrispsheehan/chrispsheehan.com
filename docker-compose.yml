services:
  dynamodb-local:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: DUMMYIDEXAMPLE
      AWS_SECRET_ACCESS_KEY: DUMMYEXAMPLEKEY
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'curl -s -o /dev/null -I -w "%{http_code}" http://localhost:8000 | grep -q 400 || exit 1'
      interval: 1s
      timeout: 2s
      retries: 10

  dynamodb-setup:
    depends_on:
      dynamodb-local:
        condition: service_healthy
    image: amazon/aws-cli
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'aws dynamodb describe-table --endpoint-url http://dynamodb-local:8000 --region $DYNAMODB_AWS_REGION --table-name $PROCESSED_LOG_FILES_TABLE || exit 1'
      interval: 1s
      timeout: 2s
      retries: 10
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: DUMMYIDEXAMPLE
      AWS_SECRET_ACCESS_KEY: DUMMYEXAMPLEKEY
    container_name: dynamodb-setup
    entrypoint:
      - /bin/sh
      - -c
      - >
        set -e;
        hash_key="$$(aws dynamodb describe-table
        --endpoint-url http://dynamodb-local:8000
        --region $$DYNAMODB_AWS_REGION
        --table-name $$PROCESSED_LOG_FILES_TABLE
        --query 'Table.KeySchema[?KeyType==`HASH`].AttributeName | [0]'
        --output text 2>/dev/null || true)";
        if [ "$$hash_key" = "object_id" ]; then
        exit 0;
        fi;
        if [ "$$hash_key" != "" ] && [ "$$hash_key" != "None" ]; then
        aws dynamodb delete-table
        --endpoint-url http://dynamodb-local:8000
        --region $$DYNAMODB_AWS_REGION
        --table-name $$PROCESSED_LOG_FILES_TABLE
        >/dev/null;
        aws dynamodb wait table-not-exists
        --endpoint-url http://dynamodb-local:8000
        --region $$DYNAMODB_AWS_REGION
        --table-name $$PROCESSED_LOG_FILES_TABLE;
        fi;
        aws dynamodb create-table
        --endpoint-url http://dynamodb-local:8000
        --region $$DYNAMODB_AWS_REGION
        --table-name $$PROCESSED_LOG_FILES_TABLE
        --billing-mode PAY_PER_REQUEST
        --key-schema AttributeName=object_id,KeyType=HASH
        --attribute-definitions AttributeName=object_id,AttributeType=S
        >/dev/null

  log-processor:
    image: python:3.12-slim
    depends_on:
      dynamodb-local:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-default}
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    volumes:
      - ".:/workspace"
      - "${HOME}/.aws:/root/.aws:ro"
    working_dir: /workspace
    entrypoint:
      - /bin/sh
      - -c
      - >
        set -e;
        python -m pip install --quiet --no-cache-dir -r lambdas/log_processor/requirements.txt;
        python -m lambdas.log_processor.logs_processor local-log-processor
        --suppress-s3-writes
        --summary-output frontend/public/data/log-processor/data.json
