<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>wip.chrispsheehan.com</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202124;
        background: #f7f5ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #202124;
        background:
          linear-gradient(135deg, rgba(27, 94, 32, 0.08), transparent 34%),
          linear-gradient(315deg, rgba(25, 118, 210, 0.10), transparent 38%),
          #f7f5ef;
      }

      main {
        width: min(920px, calc(100% - 40px));
        min-height: 100vh;
        display: grid;
        align-content: center;
        gap: 28px;
        margin: 0 auto;
        padding: 64px 0;
      }

      .eyebrow {
        margin: 0;
        color: #52635a;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(3rem, 8vw, 6.4rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        max-width: 620px;
        margin: 0;
        color: #3f4844;
        font-size: 1.08rem;
        line-height: 1.65;
      }

      dl {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        width: min(100%, 720px);
        margin: 20px 0 0;
        overflow: hidden;
        border: 1px solid #d8d3c7;
        border-radius: 8px;
        background: #d8d3c7;
      }

      div {
        min-width: 0;
        padding: 18px;
        background: rgba(255, 255, 255, 0.64);
      }

      dt {
        margin: 0 0 8px;
        color: #66716b;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      dd {
        margin: 0;
        color: #202124;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      @media (max-width: 680px) {
        main {
          width: min(100% - 28px, 920px);
          padding: 40px 0;
        }

        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">CloudFront frontend</p>
      <h1>wip.chrispsheehan.com</h1>
      <p>
        Static frontend boilerplate deployed through the repo's Terragrunt and
        GitHub Actions pipeline. This page is intentionally small while the
        infrastructure surface is set up for future Lambda-backed features.
      </p>
      <dl>
        <div>
          <dt>Origin</dt>
          <dd>Private S3</dd>
        </div>
        <div>
          <dt>Edge</dt>
          <dd>CloudFront</dd>
        </div>
        <div>
          <dt>DNS</dt>
          <dd>Route53</dd>
        </div>
      </dl>
    </main>
  </body>
</html>
