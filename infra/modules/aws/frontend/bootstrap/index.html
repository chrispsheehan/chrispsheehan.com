<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frontend Bootstrap</title>
    <style>
      body {
        margin: 0;
        font-family: monospace;
        background: #f5f1e8;
        color: #1f2933;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      p {
        line-height: 1.6;
      }

      code {
        background: #e7dcc7;
        padding: 0.15rem 0.35rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend Bootstrap</h1>
      <p>The frontend infrastructure is up, but the built frontend assets have not been deployed yet.</p>
      <p>Deploy the frontend bundle to replace this bootstrap page and serve the full app from <code>index.html</code>.</p>
    </main>
  </body>
</html>
